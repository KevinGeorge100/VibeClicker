name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd VibeClicker
            git pull origin main
            sudo docker stop vibeclicker || true
            sudo docker rm vibeclicker || true
            sudo docker build -t vibe-clicker .
            sudo docker run -d -p 80:80 --name vibeclicker --restart always vibe-clicker
